name: myotwin_app
description: Flutter client for MyoTwin.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: '>=3.11.5'
  flutter: '>=3.41.9'

dependencies:
  bonsoir: ^6.1.0
  drift: ^2.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.2
  flutter_local_notifications: ^17.0.0
  flutter_tts: ^4.0.0
  fpdart: ^1.2.0
  go_router: ^13.0.0
  myotwin_ui:
    path: ./
  shared_core:
    path: ../shared_core
  # speech_to_text: ^7.0.0
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    # --- STATIC MULTI-FILE SETUP ---
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Italic.ttf
          style: italic
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceMono-BoldItalic.ttf
          weight: 700
          style: italic

    # --- VARIABLE SINGLE-FILE SETUP ---
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-VariableFont_wght.ttf
          style: italic
