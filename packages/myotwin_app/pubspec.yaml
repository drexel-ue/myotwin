name: myotwin_app
description: Flutter client for MyoTwin.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: '>=3.11.5'
  flutter: '>=3.41.9'

dependencies:
  drift: ^2.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.2
  flutter_scene: ^0.15.0
  fpdart: ^1.2.0
  go_router: ^13.0.0
  llamadart: ^0.6.13
  myotwin_ui:
    path: ./
  path: ^1.9.0
  path_provider: ^2.1.2
  provider: ^6.1.1
  shared_core:
    path: ../shared_core
  shared_preferences: ^2.2.3
  sqlite3_flutter_libs: ^0.5.20
  uuid: ^4.3.3
  # speech_to_text: ^7.0.0

dev_dependencies:
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/models/

  fonts:
    # --- STATIC MULTI-FILE SETUP ---
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Italic.ttf
          style: italic
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceMono-BoldItalic.ttf
          weight: 700
          style: italic

    # --- VARIABLE SINGLE-FILE SETUP ---
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-VariableFont_wght.ttf
          style: italic
