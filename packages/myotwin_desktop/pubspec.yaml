name: myotwin_desktop
description: Flutter desktop client for MyoTwin — floating callout windows and deep audit dashboard.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.11.4"
  flutter: ">=3.38.1"

dependencies:
  drift: ^2.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.2
  fpdart: ^1.2.0
  go_router: ^13.0.0
  shared_core:
    path: ../shared_core
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
