version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.11.4"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  genui: any
  json_schema_builder: ^0.1.3

dev_dependencies:
  build_runner: any
  flutter_test:
    sdk: flutter
  test: ^1.25.0
