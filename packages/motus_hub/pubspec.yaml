name: motus_hub
description: Motus Hub — Dart server for MyoTwin. Orchestrates LLM calls, tool execution, and RAG.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.11.4"

dependencies:
  drift: ^2.0.0
  fpdart: ^1.2.0
  http: ^1.1.0
  json_rpc_2: ^3.0.0
  shared_core:
    path: ../shared_core
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_web_socket: ^2.0.0

dev_dependencies:
  build_runner: any
  drift_dev: ^2.0.0
  test: ^1.25.0
